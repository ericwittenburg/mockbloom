services:
  - type: web
    name: mockbloom-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TEMPLATES_BUCKET
        value: templates
      - key: MOCKUPS_BUCKET
        value: mockups
      - key: MAX_UPLOAD_BYTES
        value: "8388608"
